{% extends "base.html" %}
{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<div class="admin-container">
  <!-- Header -->
  <h2 class="admin-title"> Admin Dashboard</h2>
  <p class="welcome-text">Welcome, <strong>{{ session['username'] }}</strong></p>

  <!-- Actions -->

  <div class="cards">
    
    <!-- Users Card -->
    <div class="card">
      <i class="fas fa-users card-icon"></i>
      <h3>Users</h3>
      <p>View and manage registered users</p>
      <a href="{{ url_for('view_users') }}" class="btn">Manage Users</a>
    </div>

    <!-- URL Checks Card -->
    <div class="card">
      <i class="fas fa-search card-icon"></i>
      <h3>URL Checks</h3>
      <p>Monitor all phishing checks</p>
      <a href="{{ url_for('view_checks') }}" class="btn">View Checks</a>
    </div>
  </div>
</div>
{% endblock %}
